<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">TelegramRu — Официальный Клиент</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        html, body { height: 100%; width: 100%; overflow: hidden; background-color: #e7ebf0; }

        /* ОКНО ЧАТА */
        .chat-container { display: flex; flex-direction: column; width: 100vw; height: 100vh; background: #f4f4f5; }
        .chat-header { padding: 15px; background: #fff; border-bottom: 1px solid #e6e6e6; font-weight: bold; text-align: center; font-size: 18px; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg-bubble { background: #fff; padding: 10px 14px; border-radius: 10px; max-width: 70%; align-self: flex-start; box-shadow: 0 1px 2px rgba(0,0,0,0.1); font-size: 15px; line-height: 1.4; }
        .msg-bubble.my { background: #eeffde; align-self: flex-end; }
        
        /* ПАНЕЛЬ ВВОДА */
        .input-panel { padding: 15px; background: #fff; border-top: 1px solid #e6e6e6; display: flex; gap: 10px; }
        .chat-input { flex: 1; padding: 12px; border: 1px solid #e6e6e6; border-radius: 8px; outline: none; font-size: 15px; }
        .send-btn { background: #2481cc; color: white; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 15px; }
        .send-btn:hover { background: #1f71b3; }
    </style>
</head>
<body>

    <!-- ИНТЕРФЕЙС КЛИЕНТА (ОКНО ВХОДА ПОЛНОСТЬЮ УДАЛЕНО) -->
    <div class="chat-container">
        <div class="chat-header" id="chat-header">Загрузка чата...</div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="input-panel">
            <input type="text" class="chat-input" id="chat-input" placeholder="Напишите сообщение...">
            <button class="send-btn" id="send-btn">Отправить</button>
        </div>
    </div>

    <script>
        // ВСТАВЬТЕ СВОЙ ID ИЗ NPOINT МЕЖДУ СЛЕДУЮЩИХ КАВЫЧЕК
        const NPOINT_URL = 'https://api.npoint.io/a8fcd8db01ea5efb569e'; 

        // Резервные сообщения, если npoint не ответит
        let serverData = { 
            title: "TelegramRu — Официальный Клиент", 
            messages: ["Система: Чат работает локально. Подключите npoint."] 
        }; 

        // 1. ЗАГРУЗКА СООБЩЕНИЙ ИЗ СЕТИ
        async function loadConfig() {
            try {
                const response = await fetch(NPOINT_URL);
                if (!response.ok) throw new Error();
                
                serverData = await response.json();
            } catch (e) {
                console.log("npoint недоступен, включен локальный режим.");
            }
            
            // Применяем настройки и выводим чат
            document.title = serverData.title || "TelegramRu";
            document.getElementById('chat-header').innerText = serverData.title || "Основной чат";
            renderMessages();
        }

        // 2. ОТОБРАЖЕНИЕ СООБЩЕНИЙ
        function renderMessages() {
            const container = document.getElementById('chat-messages');
            container.innerHTML = '';
            
            if (serverData.messages) {
                serverData.messages.forEach(msg => {
                    const bubble = document.createElement('div');
                    bubble.classList.add('msg-bubble');
                    
                    // Сообщения, начинающиеся с "Вы:", автоматически уходят направо и красятся в зеленый
                    if (msg.startsWith("Вы:")) {
                        bubble.classList.add('my');
                    }
                    bubble.innerText = msg;
                    container.appendChild(bubble);
                });
            }
            container.scrollTop = container.scrollHeight; // Автоматическая прокрутка вниз
        }

        // 3. ОТПРАВКА И СОХРАНЕНИЕ НОВОГО СООБЩЕНИЯ
        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;

            const fullMessage = "Вы: " + text;
            
            if (!serverData.messages) serverData.messages = [];
            serverData.messages.push(fullMessage);
            
            renderMessages(); 
            input.value = '';

            // Перезаписываем обновленный массив сообщений в npoint
            try {
                await fetch(NPOINT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(serverData)
                });
            } catch (e) {
                console.error("Не удалось сохранить сообщение в облаке:", e);
            }
        }

        // Слушатели событий клика и нажатия Enter
        document.getElementById('send-btn').onclick = sendMessage;
        document.getElementById('chat-input').onkeydown = (e) => { if (e.key === 'Enter') sendMessage(); };

        // Автоматический старт при загрузке страницы
        loadConfig();
    </script>
</body>
</html>
