<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TelegramRu — Официальный Клиент</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        html, body { height: 100%; width: 100%; overflow: hidden; background-color: #e7ebf0; }

        /* ТЕМНАЯ ТЕМА */
        body.dark-mode { --bg-main: #182533; --bg-sidebar: #17212b; --bg-chat: #0e1621; --text-color: #f5f5f5; --text-muted: #7f91a4; --border-color: #101921; --chat-hover: #202b36; --chat-active: #2b394a; }
        body { --bg-main: #fff; --bg-sidebar: #fff; --bg-chat: #f4f4f5; --text-color: #000; --text-muted: #8e8e93; --border-color: #e6e6e6; --chat-hover: #f2f6fa; --chat-active: #e2eff9; }

        /* ОКНО АДМИН-АВТОРИЗАЦИИ (МОДАЛЬНОЕ) */
        .admin-modal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.5); z-index: 9999; align-items: center; justify-content: center; }
        .admin-box { width: 340px; background: var(--bg-main); padding: 25px; border-radius: 12px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); color: var(--text-color); }
        .admin-title { font-size: 20px; font-weight: bold; margin-bottom: 15px; }
        .admin-input { width: 100%; padding: 10px 12px; margin-bottom: 12px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-chat); color: var(--text-color); outline: none; }
        .admin-btn-row { display: flex; gap: 10px; justify-content: center; }
        .admin-btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .admin-submit { background: #2481cc; color: white; }
        .admin-cancel { background: var(--border-color); color: var(--text-muted); }
        .admin-error { color: #e53935; font-size: 13px; margin-top: 10px; display: none; }

        /* ОСНОВНОЙ КОНТЕЙНЕР */
        .tg-container { width: 100vw; height: 100vh; background: var(--bg-main); display: flex; overflow: hidden; }
        
        /* БОКОВАЯ ПАНЕЛЬ */
        .sidebar { width: 30%; max-width: 400px; min-width: 300px; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; background: var(--bg-sidebar); position: relative; }
        .sidebar-header { padding: 14px 15px; background: #2481cc; color: white; font-weight: bold; font-size: 18px; display: flex; justify-content: space-between; align-items: center; }
        .menu-btn { cursor: pointer; font-size: 20px; padding: 5px; }
        
        /* Поиск */
        .search-container { padding: 10px 12px; background: var(--bg-sidebar); border-bottom: 1px solid var(--border-color); }
        .search-bar { width: 100%; padding: 8px 12px; background: var(--bg-chat); border: 1px solid transparent; border-radius: 8px; font-size: 14px; color: var(--text-color); outline: none; }
        
        /* Список чатов */
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { display: flex; align-items: center; padding: 10px 12px; cursor: pointer; border-bottom: 1px solid var(--border-color); }
        .chat-item:hover { background: var(--chat-hover); }
        .chat-item.active { background: var(--chat-active); }
        
        .avatar { width: 48px; height: 48px; border-radius: 50%; margin-right: 12px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 16px; background-size: cover; background-position: center; flex-shrink: 0; }
        .chat-info { flex: 1; min-width: 0; }
        .chat-name-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .chat-name { font-weight: 500; font-size: 15px; color: var(--text-color); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-time { font-size: 12px; color: var(--text-muted); }
        .chat-last-msg { font-size: 14px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* ОКНО ЧАТА */
        .chat-window { flex: 1; display: flex; flex-direction: column; background: var(--bg-chat); position: relative; }
        .chat-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.06; background-image: url('https://githubusercontent.com'); pointer-events: none; }
        
        .chat-header { height: 56px; background: var(--bg-main); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; padding: 0 20px; z-index: 10; }
        .chat-header-info { display: flex; flex-direction: column; }
        .chat-header-name { font-weight: 500; font-size: 16px; color: var(--text-color); }
        .chat-header-status { font-size: 13px; color: #2481cc; }

        /* Сообщения */
        .messages-container { flex: 1; overflow-y: auto; padding: 20px 10%; z-index: 10; display: flex; flex-direction: column; gap: 8px; }
        .msg-bubble { max-width: 60%; padding: 8px 14px; border-radius: 12px; font-size: 15px; position: relative; line-height: 1.4; word-wrap: break-word; }
        .msg-in { background: var(--bg-main); color: var(--text-color); align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg-out { background: #eff6fe; color: #000; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg-time { font-size: 11px; color: #7f91a4; float: right; margin: 5px 0 -3px 8px; }

        /* Поле ввода */
        .input-panel { padding: 10px 10%; background: var(--bg-main); display: flex; align-items: center; gap: 12px; border-top: 1px solid var(--border-color); z-index: 10; }
        .message-input { flex: 1; border: none; padding: 10px; font-size: 15px; outline: none; background: transparent; color: var(--text-color); }
        .send-btn { color: #2481cc; font-weight: bold; cursor: pointer; font-size: 16px; text-transform: uppercase; background: none; border: none; }

        /* ПАНЕЛЬ НАСТРОЕК */
        .settings-panel { position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: var(--bg-main); z-index: 20; transition: left 0.3s ease; display: flex; flex-direction: column; }
        .settings-panel.active { left: 0; }
        .settings-header { background: #2481cc; color: white; padding: 15px; display: flex; align-items: center; gap: 15px; font-size: 18px; font-weight: bold; }
        .back-btn { cursor: pointer; font-size: 20px; }
        .settings-content { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 20px; color: var(--text-color); }
        
        .profile-section { text-align: center; position: relative; padding-bottom: 15px; border-bottom: 1px solid var(--border-color); }
        .my-avatar-container { position: relative; width: 90px; height: 90px; margin: 0 auto 10px; }
        .my-avatar { width: 100%; height: 100%; border-radius: 50%; background: #999; color: white; font-size: 32px; font-weight: bold; display: flex; align-items: center; justify-content: center; background-size: cover; background-position: center; }
        .file-overlay { position: absolute; bottom: 0; right: 0; background: #2481cc; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; color: white; font-size: 14px; cursor: pointer; border: 2px solid var(--bg-main); display: none; }
        
        .setting-item { display: flex; flex-direction: column; gap: 5px; }
        .setting-item label { font-size: 13px; color: #2481cc; font-weight: 500; }
        .setting-item input, .setting-item textarea { width: 100%; padding: 8px 10px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-chat); color: var(--text-color); outline: none; }
        .toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border-color); }
        
        .btn-admin-login { width: 100%; background: #e53935; color: white; padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .admin-badge { background: #2481cc; color: white; padding: 2px 8px; border-radius: 10px; font-size: 11px; display: none; margin-top: 5px; inline-size: max-content; margin-left: auto; margin-right: auto; }

        /* Заглушка пустого чата */
        .empty-chat { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-muted); background: var(--bg-chat); position: relative; }
        .empty-hint { background: rgba(0,0,0,0.4); color: white; padding: 6px 12px; border-radius: 12px; font-size: 14px; z-index: 10; }
    </style>
</head>
<body>

    <!-- МОДАЛЬНОЕ ОКНО ДЛЯ ВХОДА В АДМИНКУ (ИЗ НАСТРОЕК) -->
    <div class="admin-modal" id="adminModal">
        <div class="admin-box">
            <div class="admin-title">Доступ Администратора</div>
            <input type="text" id="adminUser" class="admin-input" placeholder="Логин админа">
            <input type="password" id="adminPass" class="admin-input" placeholder="Пароль админа">
            <div class="admin-btn-row">
                <button class="admin-btn admin-submit" onclick="confirmAdminLogin()">Войти</button>
                <button class="admin-btn admin-cancel" onclick="closeAdminModal()">Отмена</button>
            </div>
            <div class="admin-error" id="adminError">Неверный логин или пароль!</div>
        </div>
    </div>

    <!-- ОСНОВНОЙ ИНТЕРФЕЙС ПРИЛОЖЕНИЯ -->
    <div class="tg-container">
        
        <!-- Левая колонка -->
        <div class="sidebar">
            <div class="sidebar-header">
                <span class="menu-btn" onclick="toggleSettings(true)">☰</span>
                <span>Telegram</span>
                <span style="font-size: 14px; opacity: 0.8;">Ru</span>
            </div>
            
            <div class="search-container">
                <input type="text" class="search-bar" placeholder="Поиск">
            </div>
            
            <div class="chat-list" id="chatList"></div>

            <!-- ОКНО НАСТРОЕК -->
            <div class="settings-panel" id="settingsPanel">
                <div class="settings-header">
                    <span class="back-btn" onclick="toggleSettings(false)">←</span>
                    <span>Настройки</span>
                </div>
                <div class="settings-content">
                    <div class="profile-section">
                        <div class="my-avatar-container">
                            <div class="my-avatar" id="myAvatar">U</div>
                            <label class="file-overlay" id="avatarLabel" for="avatarUpload">📷</label>
                            <input type="file" id="avatarUpload" style="display:none" accept="image/*" onchange="uploadAvatar(event)">
                        </div>
                        <h3 id="profileNameDisplay" style="margin-bottom: 4px;">Пользователь</h3>
                        <p id="profileTagDisplay" style="font-size: 13px; color: var(--text-muted);">@user_client</p>
                        <div class="admin-badge" id="adminBadge">Администратор</div>
                        
                        <!-- Кнопка авторизации админа -->
                        <button class="btn-admin-login" id="adminLoginBtn" onclick="openAdminModal()">Войти как Администратор</button>
                    </div>

                    <div class="setting-item">
                        <label>Ваше имя</label>
                        <input type="text" id="settingName" value="Пользователь" oninput="updateProfileName(this.value)" disabled>
                    </div>

                    <div class="setting-item">
                        <label>О себе</label>
                        <textarea id="settingBio" placeholder="Доступно только администраторам..." disabled>Обычный клиент TelegramRu</textarea>
                    </div>

                    <div class="toggle-row">
                        <span>Ночной режим</span>
                        <input type="checkbox" id="darkThemeToggle" onchange="toggleTheme(this.checked)" style="width: 20px; height: 20px; cursor: pointer;">
                    </div>

                    <div class="setting-item">
                        <label>Цвет фона чата</label>
                        <input type="color" value="#f4f4f5" onchange="changeChatBg(this.value)">
                    </div>
                </div>
            </div>
        </div>

        <!-- Правая колонка -->
        <div class="chat-window" id="chatWindow">
            <div class="chat-bg"></div>
            
            <div class="empty-chat" id="emptyChatHint">
                <div class="chat-bg"></div>
                <div class="empty-hint">Выберите чат, чтобы начать общение</div>
            </div>

            <div class="chat-header" id="chatHeader" style="display: none;">
                <div class="chat-header-info">
                    <span class="chat-header-name" id="currentChatName">Чат</span>
                    <span class="chat-header-status">в сети</span>
                </div>
            </div>

            <div class="messages-container" id="messagesBox" style="display: none;"></div>

            <div class="input-panel" id="inputPanel" style="display: none;">
                <input type="text" class="message-input" id="messageText" placeholder="Напишите сообщение..." onkeypress="handleKeyPress(event)">
                <button class="send-btn" onclick="sendMessage()">Отправка</button>
            </div>
        </div>

    </div>

    <script>
        const BIN_ID = "a8fcd8db01ea5efb569e"; 
        const URL = `https://api.npoint.io/a8fcd8db01ea5efb569e`;

        let chatsData = [];
        let activeChatId = null;
        let myAvatarUrl = ""; 
        let isAdmin = false; // По умолчанию заходим как обычный пользователь

        // Автоматический вход обычного юзера при загрузке страницы
        window.onload = function() {
            loadDefaultUser();
        };

        function loadDefaultUser() {
            // Базовые локальные демо-чаты для обычного юзера
            chatsData = [
                { id: 1, name: "Павел Дуров", color: "#2481cc", initial: "ПД", history: [{ text: "Привет! Вы вошли как обычный пользователь.", isOut: false, time: "12:00" }] },
                { id: 2, name: "Поддержка", color: "#4caf50", initial: "ПД", history: [{ text: "Чтобы синхронизировать облако, войдите в админку через настройки.", isOut: false, time: "12:01" }] }
            ];
            initApp();
        }

        // Окна модалки админа
        function openAdminModal() {
            document.getElementById('adminModal').style.display = 'flex';
        }

        function closeAdminModal() {
            document.getElementById('adminModal').style.display = 'none';
            document.getElementById('adminError').style.display = 'none';
        }

        // Проверка данных админа изнутри настроек
        async function confirmAdminLogin() {
            const userInp = document.getElementById('adminUser').value.trim();
            const passInp = document.getElementById('adminPass').value.trim();
            const errMsg = document.getElementById('adminError');

            if (userInp === "Yarik34051" && passInp === "RePaCk By XatabEdition") {
                isAdmin = true;
                closeAdminModal();
                
                // Переключаем интерфейс на админский режим
                document.getElementById('adminLoginBtn').style.display = 'none';
                document.getElementById('adminBadge').style.display = 'block';
                document.getElementById('avatarLabel').style.display = 'flex';
                document.getElementById('settingName').disabled = false;
                document.getElementById('settingBio').disabled = false;
                document.getElementById('profileTagDisplay').innerText = "@yarik34051_admin";

                // Загружаем данные админа из npoint.io корзины
                document.getElementById('chatList').innerHTML = "<div style='padding:15px; color:gray;'>Синхронизация админки...</div>";
                await loadDataFromCloud();
                initApp();
            } else {
                errMsg.style.display = 'block';
            }
        }

        // Загрузка (работает только для админа)
        async function loadDataFromCloud() {
            if (!isAdmin) return;
            try {
                const response = await fetch(URL);
                if (!response.ok) throw new Error("Ошибка");
                const data = await response.json();
                
                chatsData = data.chats || [];
                
                if (data.profile) {
                    document.getElementById('settingName').value = data.profile.name || "Yarik34051";
                    document.getElementById('settingBio').value = data.profile.bio || "";
                    document.getElementById('profileNameDisplay').innerText = data.profile.name || "Yarik34051";
                    
                    if (data.profile.avatar) {
                        myAvatarUrl = data.profile.avatar;
                        const av = document.getElementById('myAvatar');
                        av.style.backgroundImage = `url('${myAvatarUrl}')`;
                        av.innerText = "";
                    } else {
                        document.getElementById('myAvatar').innerText = (data.profile.name || "Y").charAt(0).toUpperCase();
                    }
                }
            } catch (error) {
                console.error("Ошибка npoint:", error);
            }
        }

        // Сохранение в облако (Доступно только если залогинен админ)
        async function saveDataToCloud() {
            if (!isAdmin) return; // Обычные юзеры не могут перезаписать npoint
            const payload = {
                profile: {
                    name: document.getElementById('settingName').value,
                    bio: document.getElementById('settingBio').value,
                    avatar: myAvatarUrl
                },
                chats: chatsData
            };

            try {
                await fetch(URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                console.log("Данные админа синхронизированы с npoint.io");
            } catch (error) {
                console.error("Ошибка сохранения:", error);
            }
        }

        // Рендеринг интерфейса чатов
        function initApp() {
            const listContainer = document.getElementById('chatList');
            listContainer.innerHTML = "";

            chatsData.forEach(chat => {
                const lastMsg = chat.history.length > 0 ? chat.history[chat.history.length - 1].text : "Нет сообщений";
                const lastTime = chat.history.length > 0 ? chat.history[chat.history.length - 1].time : "";
                
                const item = document.createElement('div');
                item.className = `chat-item ${activeChatId === chat.id ? 'active' : ''}`;
                item.onclick = () => openChat(chat.id);
                item.innerHTML = `
                    <div class="avatar" style="background-color: ${chat.color}">${chat.initial}</div>
                    <div class="chat-info">
                        <div class="chat-name-row">
                            <span class="chat-name">${chat.name}</span>
                            <span class="chat-time">${lastTime}</span>
                        </div>
                        <div class="chat-last-msg">${lastMsg}</div>
                    </div>
                `;
                listContainer.appendChild(item);
            });
        }

        function openChat(id) {
            activeChatId = id;
            document.getElementById('emptyChatHint').style.display = 'none';
            document.getElementById('chatHeader').style.display = 'flex';
            document.getElementById('messagesBox').style.display = 'flex';
            document.getElementById('inputPanel').style.display = 'flex';
            
            const chat = chatsData.find(c => c.id === id);
            document.getElementById('currentChatName').innerText = chat.name;
            
            renderMessages();
            initApp(); 
        }

        function renderMessages() {
            const box = document.getElementById('messagesBox');
            box.innerHTML = "";
            const chat = chatsData.find(c => c.id === activeChatId);

            chat.history.forEach(msg => {
                const bubble = document.createElement('div');
                bubble.className = `msg-bubble ${msg.isOut ? 'msg-out' : 'msg-in'}`;
                bubble.innerHTML = `${msg.text} <span class="msg-time">${msg.time}</span>`;
                box.appendChild(bubble);
            });
            box.scrollTop = box.scrollHeight;
        }

        async function sendMessage() {
            const inp = document.getElementById('messageText');
            const text = inp.value.trim();
            if (!text || activeChatId === null) return;

            const chat = chatsData.find(c => c.id === activeChatId);
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');

            chat.history.push({ text: text, isOut: true, time: timeStr });
            inp.value = "";
            renderMessages();
            initApp();
            
            if (isAdmin) await saveDataToCloud();
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        function toggleSettings(show) {
            const panel = document.getElementById('settingsPanel');
            if (show) {
                panel.classList.add('active');
            } else {
                panel.classList.remove('active');
                if (isAdmin) saveDataToCloud(); 
            }
        }

        function updateProfileName(val) {
            const name = val.trim() || "Yarik34051";
            document.getElementById('profileNameDisplay').innerText = name;
            if (!myAvatarUrl) {
                document.getElementById('myAvatar').innerText = name.charAt(0).toUpperCase();
            }
        }

        function uploadAvatar(event) {
            if (!isAdmin) return;
            const file = event.target.files;
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function(e) {
                myAvatarUrl = e.target.result;
                const av = document.getElementById('myAvatar');
                av.style.backgroundImage = `url('${myAvatarUrl}')`;
                av.innerText = "";
                await saveDataToCloud();
            }
            reader.readAsDataURL(file);
        }

        function toggleTheme(isDark) {
            if (isDark) document.body.className = "dark-mode";
            else document.body.className = "";
        }

        function changeChatBg(color) {
            document.getElementById('chatWindow').style.backgroundColor = color;
        }
    </script>
</body>
</html>
